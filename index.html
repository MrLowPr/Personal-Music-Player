<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Personal Music</title>
<style>
  :root{
    --bg:#121014;
    --bg-elevated:#19161b;
    --row-hover:#211d23;
    --row-active:#241d16;
    --border:#2a262c;
    --text:#f3eee6;
    --text-dim:#9b948c;
    --text-faint:#6b655f;
    --accent:#e8a33d;
    --accent-soft:rgba(232,163,61,0.14);
    --meter:#6e8f79;
    --danger:#c1503f;
    --font-display:Georgia,'Iowan Old Style','Palatino Linotype',serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent-soft);color:var(--text);}
  button{font-family:inherit;}
  input:focus-visible, button:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  .app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
    padding-bottom:calc(120px + env(safe-area-inset-bottom));
    width:100%;
    overflow-x:hidden;
  }

  /* ---------- Topbar ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:10;
    background:linear-gradient(var(--bg) 80%, rgba(18,16,20,0));
    padding:clamp(16px,4vw,28px) clamp(14px,4vw,32px) 18px;
    padding-top:calc(clamp(16px,4vw,28px) + env(safe-area-inset-top));
    padding-left:calc(clamp(14px,4vw,32px) + env(safe-area-inset-left));
    padding-right:calc(clamp(14px,4vw,32px) + env(safe-area-inset-right));
    display:flex;
    align-items:baseline;
    gap:clamp(10px,2vw,28px);
    flex-wrap:wrap;
    border-bottom:1px solid transparent;
    max-width:1600px;
    margin:0 auto;
    width:100%;
  }
  .brand{
    font-family:var(--font-display);
    font-size:clamp(19px,4.2vw,26px);
    font-style:italic;
    letter-spacing:0.2px;
    white-space:nowrap;
    color:var(--text);
  }
  .brand em{color:var(--accent);font-style:italic;}
  .brand .dot{color:var(--text-faint);margin:0 2px;}

  .quick-actions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .qa-btn{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--accent-soft);
    color:var(--accent);
    border:1px solid rgba(232,163,61,0.3);
    padding:8px 16px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .qa-btn:hover{background:var(--accent);color:var(--bg);}
  .qa-btn.secondary{
    background:none;
    color:var(--text-dim);
    border-color:var(--border);
  }
  .qa-btn.secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  .topbar-right{
    display:flex;
    align-items:center;
    gap:14px;
    margin-left:auto;
  }
  .stats{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-faint);
    white-space:nowrap;
  }
  .sort-toggle{
    background:none;
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:12px;
    padding:6px 12px;
    border-radius:14px;
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .sort-toggle:hover{border-color:var(--accent);color:var(--text);}
  .sort-toggle.active{color:var(--accent);border-color:var(--accent);}

  /* ---------- Library list ---------- */
  .library{
    flex:1;
    padding:6px clamp(14px,4vw,32px) 40px;
    max-width:1600px;
    margin:0 auto;
    width:100%;
    padding-left:calc(clamp(14px,4vw,32px) + env(safe-area-inset-left));
    padding-right:calc(clamp(14px,4vw,32px) + env(safe-area-inset-right));
  }
  .col-headers{
    display:grid;
    grid-template-columns:36px 1fr minmax(90px,130px) 56px;
    gap:clamp(8px,2vw,16px);
    padding:8px 14px;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    border-bottom:1px solid var(--border);
    margin-bottom:4px;
  }
  .track-row{
    display:grid;
    grid-template-columns:36px 1fr minmax(90px,130px) 56px;
    gap:clamp(8px,2vw,16px);
    align-items:center;
    padding:11px 14px;
    border-radius:8px;
    cursor:pointer;
    position:relative;
  }
  .track-row:hover{background:var(--row-hover);}
  .track-row.playing{background:var(--row-active);}

  .t-num{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-faint);
    display:flex;
    align-items:center;
    justify-content:flex-start;
  }
  .eq{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:14px;
  }
  .eq span{
    width:3px;
    background:var(--accent);
    border-radius:1px;
    animation:eqbounce 1.1s ease-in-out infinite;
  }
  .eq span:nth-child(1){animation-delay:0s;height:6px;}
  .eq span:nth-child(2){animation-delay:.2s;height:12px;}
  .eq span:nth-child(3){animation-delay:.4s;height:8px;}
  @keyframes eqbounce{
    0%,100%{transform:scaleY(0.4);}
    50%{transform:scaleY(1);}
  }
  .track-row:not(.playing) .eq{display:none;}
  .track-row.playing .t-num .plain-num{display:none;}

  .t-main{min-width:0;}
  .t-title{
    font-size:14.5px;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track-row.playing .t-title{color:var(--accent);}
  .t-artist{
    font-size:12.5px;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-top:2px;
  }

  .t-meter{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .meter-track{
    flex:1;
    height:3px;
    background:var(--border);
    border-radius:2px;
    overflow:hidden;
  }
  .meter-fill{
    height:100%;
    background:var(--meter);
    border-radius:2px;
  }
  .meter-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    color:var(--text-faint);
    width:34px;
    text-align:right;
  }

  .t-duration{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-faint);
    text-align:right;
  }

  .empty-state, .loading-state{
    padding:60px 20px;
    text-align:center;
    color:var(--text-dim);
  }
  .empty-state h2, .loading-state h2{
    font-family:var(--font-display);
    font-style:italic;
    font-weight:normal;
    font-size:22px;
    color:var(--text);
    margin-bottom:14px;
  }
  .empty-state code{
    background:var(--bg-elevated);
    border:1px solid var(--border);
    padding:2px 7px;
    border-radius:5px;
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--accent);
  }
  .empty-state p{max-width:480px;margin:8px auto;line-height:1.6;font-size:13.5px;}

  /* ---------- Player bar ---------- */
  .player-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    min-height:120px;
    background:var(--bg-elevated);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:center;
    padding:0 clamp(12px,3vw,32px);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:calc(clamp(12px,3vw,32px) + env(safe-area-inset-left));
    padding-right:calc(clamp(12px,3vw,32px) + env(safe-area-inset-right));
    z-index:20;
  }
  .player-bar-inner{
    width:100%;
    max-width:1600px;
    min-height:120px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:clamp(12px,3vw,28px);
  }
  .now-playing{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .now-title{
    font-size:16px;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:300px;
  }
  .now-artist{
    font-size:13.5px;
    color:var(--text-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:300px;
  }
  .now-placeholder{color:var(--text-faint);font-style:italic;font-family:var(--font-display);}

  .transport{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .transport-buttons{
    display:flex;
    align-items:center;
    gap:24px;
  }
  .tbtn{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px;
    border-radius:50%;
    transition:color .15s ease;
  }
  .tbtn:hover{color:var(--text);}
  .tbtn.active{color:var(--accent);}
  .tbtn.play-pause{
    color:var(--bg);
    background:var(--text);
    width:46px;height:46px;
  }
  .tbtn.play-pause:hover{background:var(--accent);}

  .seek-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    max-width:640px;
  }
  .time-label{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-faint);
    width:40px;
  }
  .time-label.end{text-align:right;}

  input[type=range]{
    -webkit-appearance:none;
    appearance:none;
    height:3px;
    background:var(--border);
    border-radius:2px;
    flex:1;
    cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:13px;height:13px;
    border-radius:50%;
    background:var(--accent);
    margin-top:0;
    box-shadow:0 0 0 3px rgba(232,163,61,0.15);
  }
  input[type=range]::-moz-range-thumb{
    width:13px;height:13px;border:none;border-radius:50%;background:var(--accent);
  }
  #seekBar{
    background:linear-gradient(to right, var(--accent) 0%, var(--accent) 0%, var(--border) 0%);
  }

  .right-controls{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:12px;
  }
  .volume-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:150px;
  }
  #volumeBar{max-width:110px;}

  /* ===== Tablet & laptop kecil ===== */
  @media (max-width:1024px){
    .col-headers, .track-row{grid-template-columns:32px 1fr 90px 56px;}
    .t-meter{max-width:70px;}
    .meter-label{width:28px;font-size:10px;}
  }

  /* ===== Tablet sempit / phone landscape besar ===== */
  @media (max-width:860px){
    .col-headers, .track-row{grid-template-columns:28px 1fr 60px;}
    .t-meter{display:none;}
    .now-title, .now-artist{max-width:200px;}
  }

  /* ===== Ponsel (portrait) ===== */
  @media (max-width:640px){
    .topbar{align-items:flex-start;gap:10px;}
    .topbar-right{margin-left:0;width:100%;justify-content:space-between;}
    .quick-actions{width:100%;}
    .qa-btn{flex:1;justify-content:center;padding:9px 10px;font-size:12.5px;}

    .player-bar{padding-top:10px;}
    .player-bar-inner{
      grid-template-columns:1fr;
      min-height:auto;
      gap:10px;
      padding:6px 0 10px;
    }
    .now-playing{
      display:flex;
      flex-direction:row;
      align-items:baseline;
      gap:8px;
      order:0;
      overflow:hidden;
    }
    .now-title{min-width:0;flex:0 1 auto;}
    .now-artist{min-width:0;flex:0 1 auto;}
    .transport{order:1;gap:8px;}
    .transport-buttons{gap:clamp(14px,6vw,24px);}
    .right-controls{order:2;justify-content:center;}
    .volume-row{width:min(220px,80vw);}
  }

  /* ===== Ponsel kecil ===== */
  @media (max-width:380px){
    .brand{font-size:18px;}
    .stats{display:none;}
    .qa-btn{font-size:11.5px;padding:8px 8px;gap:5px;}
    .tbtn.play-pause{width:42px;height:42px;}
    .transport-buttons{gap:14px;}
    .seek-row{gap:6px;}
    .time-label{width:32px;font-size:11px;}
    .now-artist{display:none;}
  }

  /* ===== Layar pendek (phone landscape / jendela browser diperkecil) ===== */
  @media (max-height:480px) and (orientation:landscape){
    .app{padding-bottom:104px;}
    .topbar{padding-top:10px;padding-bottom:8px;}
    .brand{font-size:16px;}
    .player-bar{min-height:auto;}
    .player-bar-inner{min-height:auto;padding:6px 0;gap:8px;}
    .transport{gap:4px;}
    .tbtn.play-pause{width:36px;height:36px;}
    .now-playing{display:flex;flex-direction:row;gap:8px;}
  }

  /* ===== Layar sangat lebar (monitor besar / TV) ===== */
  @media (min-width:1900px){
    .topbar, .library, .player-bar-inner{max-width:1800px;}
    .col-headers, .track-row{grid-template-columns:48px 1fr 160px 80px;}
  }
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">Personal <em>Music</em></div>
    <div class="quick-actions">
      <button class="qa-btn" id="playAllBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        Putar Semua
      </button>
      <button class="qa-btn secondary" id="shuffleAllBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Acak Semua
      </button>
    </div>
    <div class="topbar-right">
      <button class="sort-toggle active" id="sortToggle" title="Ganti urutan daftar">Paling sering diputar</button>
      <div class="stats" id="statsLabel">Memindai musik…</div>
    </div>
  </header>

  <main class="library" id="libraryRoot">
    <div class="loading-state" id="loadingState">
      <h2>Memindai koleksi musikmu…</h2>
      <p>Sedang mencari file <code>music1.mp3</code> sampai <code>music<span id="maxTracksLabel"></span>.mp3</code> di folder yang sama dengan halaman ini.</p>
    </div>
  </main>

  <footer class="player-bar">
   <div class="player-bar-inner">
    <div class="now-playing" id="nowPlaying">
      <div class="now-title now-placeholder">Belum ada lagu diputar</div>
      <div class="now-artist"></div>
    </div>

    <div class="transport">
      <div class="transport-buttons">
        <button class="tbtn" id="shuffleBtn" title="Acak (Shuffle)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="tbtn" id="prevBtn" title="Sebelumnya">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="2" height="16"/></svg>
        </button>
        <button class="tbtn play-pause" id="playBtn" title="Putar/Jeda">
          <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        </button>
        <button class="tbtn" id="nextBtn" title="Berikutnya">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="17" y="4" width="2" height="16"/></svg>
        </button>
        <button class="tbtn" id="repeatBtn" title="Ulangi (Repeat)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="seek-row">
        <span class="time-label" id="curTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        <span class="time-label end" id="durTime">0:00</span>
      </div>
    </div>

    <div class="right-controls">
      <div class="volume-row">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-dim);flex:none;"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="range" id="volumeBar" min="0" max="100" value="80">
      </div>
    </div>
   </div>
  </footer>

</div>

<script>
/* =========================================================================
   PENGATURAN PERSONAL MUSIC
   -------------------------------------------------------------------------
   1. Taruh file mp3 kamu di folder yang SAMA dengan file index.html ini.
   2. Beri nama file: music1.mp3, music2.mp3, music3.mp3, dst.
      (file bernama "music.mp3" tanpa angka juga otomatis dicoba/dideteksi)
   3. Minimal 10 file supaya daftar terlihat penuh, tapi boleh lebih banyak.
   4. Kalau punya lebih dari 30 lagu, naikkan angka MAX_TRACKS di bawah ini.
   5. (Opsional) Kalau situs ini dibuka langsung dari file (bukan lewat
      server / GitHub Pages), judul & artis lagu tidak bisa dibaca otomatis
      dari tag MP3 -- isi TITLE_OVERRIDES di bawah untuk kasih nama manual.
   ========================================================================= */

const MAX_TRACKS = 30;

const TITLE_OVERRIDES = {
  // Contoh pengisian manual (hapus tanda // di depan baris untuk memakainya):
  // 'music1.mp3': { title: 'Bohemian Rhapsody', artist: 'Queen' },
  // 'music2.mp3': { title: 'Kesempurnaan Cinta', artist: 'Yovie & Nuno' },
};

/* ========================================================================= */

document.getElementById('maxTracksLabel').textContent = MAX_TRACKS;

const STORAGE_KEY = 'personalMusic.playCounts.v1';
const PREF_KEY = 'personalMusic.prefs.v1';

let library = [];          // {file,title,artist,duration}
let visibleOrder = [];      // index ke library, setelah difilter pencarian
let queue = [];             // urutan pemutaran (mengikuti visibleOrder atau acak)
let queuePos = -1;
let currentLibIndex = -1;
let shuffleOn = false;
let repeatMode = 'off';     // off | all | one
let countedThisPlay = false;
let sortByPlays = true;

const player = new Audio();
player.preload = 'metadata';

const els = {
  libraryRoot: document.getElementById('libraryRoot'),
  statsLabel: document.getElementById('statsLabel'),
  playAllBtn: document.getElementById('playAllBtn'),
  shuffleAllBtn: document.getElementById('shuffleAllBtn'),
  sortToggle: document.getElementById('sortToggle'),
  nowPlaying: document.getElementById('nowPlaying'),
  playBtn: document.getElementById('playBtn'),
  playIcon: document.getElementById('playIcon'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  shuffleBtn: document.getElementById('shuffleBtn'),
  repeatBtn: document.getElementById('repeatBtn'),
  seekBar: document.getElementById('seekBar'),
  curTime: document.getElementById('curTime'),
  durTime: document.getElementById('durTime'),
  volumeBar: document.getElementById('volumeBar'),
};

/* ---------------- Utility ---------------- */

function loadCounts(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ return {}; }
}
function saveCounts(counts){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)); }catch(e){}
}
function loadPrefs(){
  try{ return JSON.parse(localStorage.getItem(PREF_KEY)) || {}; }catch(e){ return {}; }
}
function savePrefs(p){
  try{ localStorage.setItem(PREF_KEY, JSON.stringify(p)); }catch(e){}
}
function formatTime(sec){
  if(!isFinite(sec) || sec < 0) return '0:00';
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60);
  return m + ':' + String(s).padStart(2,'0');
}
function niceNameFromFile(file){
  const m = file.match(/^music(\d*)\.mp3$/i);
  if(m){
    return m[1] ? ('Music ' + m[1]) : 'Music';
  }
  return file.replace(/\.mp3$/i,'').replace(/[_-]+/g,' ').trim();
}
function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ---------------- ID3 (opsional, hanya berhasil lewat http/https) ---------------- */

function synchsafe(view,pos){
  return ((view.getUint8(pos)&0x7f)*0x200000)+((view.getUint8(pos+1)&0x7f)*0x4000)+((view.getUint8(pos+2)&0x7f)*0x80)+(view.getUint8(pos+3)&0x7f);
}
function decodeID3Text(view,start,size){
  const encByte = view.getUint8(start);
  const bytes = new Uint8Array(view.buffer, start+1, Math.max(size-1,0));
  let str = '';
  try{
    if(encByte === 0){
      str = new TextDecoder('iso-8859-1').decode(bytes);
    } else if(encByte === 1){
      str = new TextDecoder(bytes[0] === 0xFF ? 'utf-16le' : 'utf-16be').decode(bytes.slice(2));
    } else if(encByte === 2){
      str = new TextDecoder('utf-16be').decode(bytes);
    } else {
      str = new TextDecoder('utf-8').decode(bytes);
    }
  }catch(e){ str = ''; }
  return str.replace(/\u0000/g,'').trim();
}
function parseID3(buffer){
  try{
    const view = new DataView(buffer);
    if(buffer.byteLength < 10) return null;
    const tag = String.fromCharCode(view.getUint8(0),view.getUint8(1),view.getUint8(2));
    if(tag !== 'ID3') return null;
    const majorVersion = view.getUint8(3);
    const tagSize = synchsafe(view,6);
    let offset = 10;
    const end = Math.min(10+tagSize, buffer.byteLength);
    const result = {};
    while(offset < end - 10){
      const frameId = String.fromCharCode(view.getUint8(offset),view.getUint8(offset+1),view.getUint8(offset+2),view.getUint8(offset+3));
      if(!/^[A-Z0-9]{4}$/.test(frameId)) break;
      let frameSize;
      if(majorVersion >= 4){ frameSize = synchsafe(view, offset+4); }
      else { frameSize = view.getUint32(offset+4,false); }
      const frameStart = offset+10;
      if(frameSize <= 0 || frameStart+frameSize > buffer.byteLength) break;
      if(frameId === 'TIT2' || frameId === 'TPE1'){
        const text = decodeID3Text(view, frameStart, frameSize);
        if(frameId === 'TIT2' && text) result.title = text;
        if(frameId === 'TPE1' && text) result.artist = text;
      }
      offset = frameStart + frameSize;
      if(result.title && result.artist) break;
    }
    return (result.title || result.artist) ? result : null;
  }catch(e){ return null; }
}
async function tryReadID3(file){
  try{
    const res = await fetch(file, { headers: { Range: 'bytes=0-204800' } });
    if(!res.ok && res.status !== 206) return null;
    const buf = await res.arrayBuffer();
    return parseID3(buf);
  }catch(e){
    return null; // wajar terjadi kalau dibuka lewat file:// tanpa server
  }
}

/* ---------------- Scan file musik ---------------- */

function probeTrack(file){
  return new Promise((resolve)=>{
    const a = new Audio();
    let settled = false;
    const done = (exists)=>{
      if(settled) return;
      settled = true;
      resolve(exists ? { file, duration: a.duration } : null);
    };
    a.preload = 'metadata';
    a.addEventListener('loadedmetadata', ()=>done(true), { once:true });
    a.addEventListener('error', ()=>done(false), { once:true });
    a.src = file;
    setTimeout(()=>done(false), 6000);
  });
}

async function scanLibrary(){
  const candidates = ['music.mp3'];
  for(let i=1;i<=MAX_TRACKS;i++) candidates.push('music'+i+'.mp3');

  const probeResults = await Promise.all(candidates.map(probeTrack));
  const found = probeResults.filter(Boolean);

  const counts = loadCounts();

  const withMeta = await Promise.all(found.map(async (f)=>{
    let title = niceNameFromFile(f.file);
    let artist = '';
    if(TITLE_OVERRIDES[f.file]){
      title = TITLE_OVERRIDES[f.file].title || title;
      artist = TITLE_OVERRIDES[f.file].artist || '';
    } else {
      const tag = await tryReadID3(f.file);
      if(tag){
        if(tag.title) title = tag.title;
        if(tag.artist) artist = tag.artist;
      }
    }
    return {
      file: f.file,
      title,
      artist,
      duration: f.duration,
      plays: counts[f.file] || 0,
    };
  }));

  return withMeta;
}

/* ---------------- Render ---------------- */

function currentSortedLibrary(){
  const arr = library.slice();
  if(sortByPlays){
    arr.sort((a,b)=> (b.plays - a.plays) || a.file.localeCompare(b.file, undefined, {numeric:true}));
  } else {
    arr.sort((a,b)=> a.file.localeCompare(b.file, undefined, {numeric:true}));
  }
  return arr;
}

function renderLibrary(){
  const sorted = currentSortedLibrary();
  const maxPlays = Math.max(1, ...sorted.map(t=>t.plays));

  els.libraryRoot.innerHTML = '';

  if(sorted.length === 0){
    els.libraryRoot.innerHTML =
      '<div class="empty-state">' +
        '<h2>Belum ada musik ditemukan</h2>' +
        '<p>Taruh minimal 10 file di folder yang sama dengan halaman ini, ' +
        'diberi nama <code>music1.mp3</code>, <code>music2.mp3</code>, dst, lalu muat ulang halaman.</p>' +
      '</div>';
    els.statsLabel.textContent = '0 lagu';
    return;
  }

  const headers = document.createElement('div');
  headers.className = 'col-headers';
  headers.innerHTML = '<span>#</span><span>Judul</span><span>Diputar</span><span style="text-align:right;">Durasi</span>';
  els.libraryRoot.appendChild(headers);

  visibleOrder = sorted.map(t => library.findIndex(lt => lt.file === t.file));

  sorted.forEach((track, displayIndex)=>{
    const row = document.createElement('div');
    row.className = 'track-row';
    row.dataset.file = track.file;

    const pct = Math.round((track.plays / maxPlays) * 100);

    row.innerHTML =
      '<div class="t-num">' +
        '<span class="plain-num">' + (displayIndex+1) + '</span>' +
        '<span class="eq"><span></span><span></span><span></span></span>' +
      '</div>' +
      '<div class="t-main">' +
        '<div class="t-title"></div>' +
        '<div class="t-artist"></div>' +
      '</div>' +
      '<div class="t-meter">' +
        '<div class="meter-track"><div class="meter-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="meter-label">' + track.plays + 'x</div>' +
      '</div>' +
      '<div class="t-duration">' + formatTime(track.duration) + '</div>';

    row.querySelector('.t-title').textContent = track.title;
    row.querySelector('.t-artist').textContent = track.artist || '\u2014';

    if(track.file === (library[currentLibIndex] && library[currentLibIndex].file)){
      row.classList.add('playing');
    }

    row.addEventListener('click', ()=> playByFile(track.file));
    els.libraryRoot.appendChild(row);
  });

  rebuildQueue(true);
  els.statsLabel.textContent = sorted.length + ' lagu';
}

/* ---------------- Queue & playback ---------------- */

function rebuildQueue(keepCurrent){
  let order = visibleOrder.slice();
  if(shuffleOn) order = shuffleArray(order);
  queue = order;
  if(keepCurrent && currentLibIndex !== -1){
    const pos = queue.indexOf(currentLibIndex);
    queuePos = pos === -1 ? 0 : pos;
  } else {
    queuePos = 0;
  }
}

function playByFile(file){
  const libIdx = library.findIndex(t=>t.file===file);
  if(libIdx === -1) return;
  let pos = queue.indexOf(libIdx);
  if(pos === -1){ rebuildQueue(false); pos = queue.indexOf(libIdx); }
  playAtQueuePos(pos === -1 ? 0 : pos);
}

function playAtQueuePos(pos){
  if(queue.length === 0) return;
  queuePos = ((pos % queue.length) + queue.length) % queue.length;
  currentLibIndex = queue[queuePos];
  const track = library[currentLibIndex];
  countedThisPlay = false;
  player.src = track.file;
  player.play().catch(()=>{});
  updateNowPlaying(track);
  highlightPlayingRow(track.file);
}

function updateNowPlaying(track){
  const titleEl = els.nowPlaying.querySelector('.now-title');
  const artistEl = els.nowPlaying.querySelector('.now-artist');
  titleEl.textContent = track.title;
  titleEl.classList.remove('now-placeholder');
  artistEl.textContent = track.artist || '';
}

function highlightPlayingRow(file){
  els.libraryRoot.querySelectorAll('.track-row').forEach(r=>{
    r.classList.toggle('playing', r.dataset.file === file);
  });
}

function togglePlayPause(){
  if(currentLibIndex === -1){
    if(queue.length > 0) playAtQueuePos(0);
    return;
  }
  if(player.paused) player.play().catch(()=>{});
  else player.pause();
}

function goNext(){
  if(queue.length === 0) return;
  let nextPos = queuePos + 1;
  if(nextPos >= queue.length){
    if(repeatMode === 'all') nextPos = 0;
    else { player.pause(); return; }
  }
  playAtQueuePos(nextPos);
}

function goPrev(){
  if(queue.length === 0) return;
  if(player.currentTime > 3){
    player.currentTime = 0;
    return;
  }
  let prevPos = queuePos - 1;
  if(prevPos < 0){
    if(repeatMode === 'all') prevPos = queue.length - 1;
    else prevPos = 0;
  }
  playAtQueuePos(prevPos);
}

function registerPlayCount(){
  if(currentLibIndex === -1 || countedThisPlay) return;
  const threshold = Math.min(10, (player.duration || 0) * 0.2);
  if(player.currentTime >= threshold && threshold > 0){
    countedThisPlay = true;
    const track = library[currentLibIndex];
    const counts = loadCounts();
    counts[track.file] = (counts[track.file] || 0) + 1;
    saveCounts(counts);
    track.plays = counts[track.file];
    // Tidak me-render ulang urutan sekarang (biar list tidak "loncat"
    // saat lagu lagi diputar) -- urutan baru berlaku saat halaman dibuka lagi.
    const row = els.libraryRoot.querySelector('.track-row[data-file="'+CSS.escape(track.file)+'"]');
    if(row){
      const maxPlays = Math.max(1, ...library.map(t=>t.plays));
      const pct = Math.round((track.plays / maxPlays) * 100);
      row.querySelector('.meter-fill').style.width = pct + '%';
      row.querySelector('.meter-label').textContent = track.plays + 'x';
    }
  }
}

/* ---------------- Player events ---------------- */

player.addEventListener('play', ()=>{
  els.playIcon.innerHTML = '<rect x="5" y="4" width="5" height="16"/><rect x="14" y="4" width="5" height="16"/>';
});
player.addEventListener('pause', ()=>{
  els.playIcon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"/>';
});
player.addEventListener('timeupdate', ()=>{
  if(player.duration){
    els.seekBar.value = (player.currentTime / player.duration) * 100;
    const pct = els.seekBar.value;
    els.seekBar.style.background = 'linear-gradient(to right, var(--accent) ' + pct + '%, var(--border) ' + pct + '%)';
  }
  els.curTime.textContent = formatTime(player.currentTime);
  registerPlayCount();
});
player.addEventListener('loadedmetadata', ()=>{
  els.durTime.textContent = formatTime(player.duration);
});
player.addEventListener('ended', ()=>{
  if(repeatMode === 'one'){
    player.currentTime = 0;
    player.play().catch(()=>{});
  } else {
    goNext();
  }
});

els.seekBar.addEventListener('input', ()=>{
  if(player.duration){
    player.currentTime = (els.seekBar.value/100) * player.duration;
  }
});
els.volumeBar.addEventListener('input', ()=>{
  player.volume = els.volumeBar.value/100;
  savePrefs({...loadPrefs(), volume: els.volumeBar.value});
});

/* ---------------- Controls ---------------- */

els.playBtn.addEventListener('click', togglePlayPause);
els.nextBtn.addEventListener('click', goNext);
els.prevBtn.addEventListener('click', goPrev);

els.shuffleBtn.addEventListener('click', ()=>{
  shuffleOn = !shuffleOn;
  els.shuffleBtn.classList.toggle('active', shuffleOn);
  rebuildQueue(true);
  savePrefs({...loadPrefs(), shuffle: shuffleOn});
});

els.repeatBtn.addEventListener('click', ()=>{
  repeatMode = repeatMode === 'off' ? 'all' : repeatMode === 'all' ? 'one' : 'off';
  els.repeatBtn.classList.toggle('active', repeatMode !== 'off');
  els.repeatBtn.title = repeatMode === 'off' ? 'Ulangi (Repeat)' : repeatMode === 'all' ? 'Mengulang semua lagu' : 'Mengulang 1 lagu';
  savePrefs({...loadPrefs(), repeat: repeatMode});
});

els.playAllBtn.addEventListener('click', ()=>{
  if(queue.length === 0) return;
  playAtQueuePos(0);
});

els.shuffleAllBtn.addEventListener('click', ()=>{
  shuffleOn = true;
  els.shuffleBtn.classList.add('active');
  rebuildQueue(false);
  playAtQueuePos(0);
  savePrefs({...loadPrefs(), shuffle:true});
});

els.sortToggle.addEventListener('click', ()=>{
  sortByPlays = !sortByPlays;
  els.sortToggle.textContent = sortByPlays ? 'Paling sering diputar' : 'Urutan file';
  els.sortToggle.classList.toggle('active', sortByPlays);
  renderLibrary();
});

document.addEventListener('keydown', (e)=>{
  const tag = e.target.tagName;
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.code === 'Space'){ e.preventDefault(); togglePlayPause(); }
  if(e.key === 'n' || e.key === 'N') goNext();
  if(e.key === 'p' || e.key === 'P') goPrev();
});

/* ---------------- Init ---------------- */

(async function init(){
  const prefs = loadPrefs();
  if(prefs.volume !== undefined){ els.volumeBar.value = prefs.volume; player.volume = prefs.volume/100; }
  else { player.volume = 0.8; }
  if(prefs.shuffle){ shuffleOn = true; els.shuffleBtn.classList.add('active'); }
  if(prefs.repeat && prefs.repeat !== 'off'){
    repeatMode = prefs.repeat;
    els.repeatBtn.classList.add('active');
  }

  library = await scanLibrary();
  renderLibrary();
})();
</script>
